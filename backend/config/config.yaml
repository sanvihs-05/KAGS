database:
  host: localhost
  port: 5432
  database: fbsl_kags
  user: fbsl_user
  password: postgres

vector_store:
  persist_directory: ./chroma_db
  embedding_model: all-MiniLM-L6-v2
  
  # Your existing Finnish floor plan embeddings
  existing_embeddings:
    enabled: true
    path: "C:\\Users\\sanvi\\OneDrive\\Desktop\\layout\\enhanced_multimodal_rag_store"
    default_embedding_type: composite
    available_types:
      - architectural
      - composite
      - spatial
      - text
      - visual
    # Finnish-specific settings
    language: finnish
    dataset: cubicasa5k
    features:
      - room_types
      - spatial_relationships
      - visual_features
      - architectural_context

llm:
  # provider: auto (default) tries a cloud LLM first if a key is configured
  # (GROQ_API_KEY, or KAGS_LLM_API_KEY for any OpenAI-compatible endpoint),
  # then falls back to local Ollama. Set to 'ollama' or 'openai' to pin one
  # provider with no fallback. All of this is overridable via env vars:
  # KAGS_LLM_PROVIDER, KAGS_LLM_API_KEY, KAGS_LLM_BASE_URL, KAGS_LLM_MODEL,
  # GROQ_API_KEY. See backend/agents/encoder_agent.py EncoderAgent.__init__.
  #
  # Local model: llama3.2 (3.2B) — measured faster than llama3.1:8b on
  # VRAM-constrained GPUs (a laptop 4GB card partially CPU-offloads the 8B
  # model, and swapping between differently-sized models costs 30s+ just to
  # reload). Keep this the smallest installed model for the Ollama fallback
  # path to stay responsive.
  provider: auto
  model: llama3.2:latest
  temperature: 0.3
  max_tokens: 4096
  base_url: http://localhost:11434

api:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - http://localhost:3000

scoring:
  weights:
    functional_adequacy: 0.25
    behavioral_performance: 0.20
    structural_feasibility: 0.20
    layout_efficiency: 0.25
    sustainability: 0.10

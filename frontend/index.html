<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KAGS Pipeline Frontend</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>KAGS — Run Pipeline</h1>

    <form id="pipeline-form">
      <label>Project name (optional)
        <input type="text" id="project_name" placeholder="my_project" />
      </label>

      <label>Requirements (text)
        <textarea id="requirements" rows="4" placeholder="e.g. Compact 2BR apartment with daylight and separate workspace" required></textarea>
      </label>

      <div class="row">
        <label>Top K to display
          <input type="number" id="top_k" value="3" min="1" max="10" />
        </label>

        <label>Max alternatives
          <input type="number" id="max_alternatives" value="5" min="1" max="20" />
        </label>
      </div>

      <details>
        <summary>GoT params (optional)</summary>
        <div class="row">
          <label>got_delta
            <input id="got_delta" type="number" step="0.001" placeholder="e.g. 0.01" />
          </label>

          <label>got_patience
            <input id="got_patience" type="number" min="1" placeholder="e.g. 2" />
          </label>

          <label>got_max_nodes
            <input id="got_max_nodes" type="number" min="1" placeholder="e.g. 50" />
          </label>

          <label>got_selection_metric
            <select id="got_selection_metric">
              <option value="composite">composite</option>
              <option value="quality">quality</option>
            </select>
          </label>
        </div>
      </details>

      <div class="actions">
        <button type="submit">Run pipeline</button>
      </div>
    </form>

    <div id="status" class="status"></div>

    <section id="results" class="results"></section>

    <footer>
      <p>Backend endpoint: <code id="api-url">/pipeline/run</code> — change `app.js` if different host/port</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
